version: '3.8'

services:
  # ros_webots_docker容器 - 运行Webots仿真和epuck机器人
  ros-webots:
    build:
      context: /home/czz/ros_webots_docker
      dockerfile: Dockerfile
    ports:
      - "11311:11311"  # ROS Master
      - "1234:1234"    # Webots Web界面
      - "8082:8082"    # HTTP API端口
    environment:
      - DISPLAY=:0
      - ROS_MASTER_URI=http://localhost:11311
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /home/czz/ros_webots_docker/http_bridge.py:/home/ros/http_bridge.py:ro
      - /home/czz/ros_webots_docker/start_epuck_system.sh:/home/ros/start_epuck_system.sh:ro
    command: >
      bash -c "
        chmod +x /home/ros/start_epuck_system.sh &&
        /home/ros/start_epuck_system.sh
      "

  # evaluate_ros.py服务 - 运行在safetyRL_ws中
  evaluate-service:
    build:
      context: /home/czz/safetyRL_ws/Safe-Policy-Optimization
      dockerfile: Dockerfile.evaluate
    volumes:
      - /home/czz/safetyRL_ws/Safe-Policy-Optimization/safepo:/app/safepo:ro
      - /home/czz/safetyRL_ws/Safe-Policy-Optimization/http_client.py:/app/http_client.py:ro
      - /home/czz/safetyRL_ws/Safe-Policy-Optimization/test_data:/app/test_data:rw
    networks:
      - ros-webots-network
    depends_on:
      - ros-webots
    command: >
      bash -c "
        pip install torch numpy joblib requests &&
        cd /app &&
        python3 safepo/evaluate_ros.py --benchmark-dir /app/test_data --eval-episodes 3
      "

networks:
  ros-webots-network:
    driver: bridge
